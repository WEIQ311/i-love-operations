[doris]
host = 192.168.1.181
port = 9030
user = root
password = 

[hive]
catalog_name = hive_catalog
metastore_uris = thrift://hive-metastore-host:9083
hdfs_namenode = hdfs://namenode-host:8020
hadoop_user = hive

[kerberos]
enabled = true
principal = hive@YOUR_REALM.COM
keytab = /etc/security/keytabs/hive.keytab
krb5_conf = /etc/krb5.conf
hive_principal = hive/_HOST@YOUR_REALM.COM
hdfs_principal = hdfs/_HOST@YOUR_REALM.COM

[sync]
parallel = 4
replication_num = 3
create_table = true
verify_data = false
output_dir = ./sync_results
