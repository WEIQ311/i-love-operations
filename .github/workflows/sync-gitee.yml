name: 从Gitee同步到GitHub

# 配置工作流权限
env:
  # 定义需要同步的目录，排除.github/workflows目录
  EXCLUDE_DIRS: .github/workflows

# 只同步除工作流文件外的内容，避免权限问题
permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 * * * *'  # 每天每小时UTC时间整点执行，可根据需要调整cron表达式
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'WEIQ311'
          git config user.email 'weiqiang_6@126.com'

      - name: 配置Git远程仓库
        run: |
          # 移除之前可能存在的gitee远程仓库
          git remote remove gitee || true
          # 重新添加gitee远程仓库
          git remote add gitee https://gitee.com/wei311525/i-love-operations.git
          # 配置fetch所有分支
          git config remote.gitee.fetch '+refs/heads/*:refs/remotes/gitee/*'
          # 显示当前的远程仓库配置
          git remote -v

      - name: 同步Gitee代码（保留完整提交历史）
        run: |
          echo "===== 开始同步Gitee代码 ====="
          echo "当前工作目录: $(pwd)"
          
          # 确保没有残留的workflow_backup目录
          echo "清理可能残留的临时目录"
          rm -rf workflow_backup
          
          echo "获取Gitee仓库的最新代码信息"
          git fetch gitee --prune
          echo "Gitee master分支的最新提交信息:"
          git log -n 1 gitee/master --oneline
          
          # 保存GitHub上的工作流文件
          echo "保存当前工作流文件"
          mkdir -p workflow_backup
          cp -r .github/workflows/* workflow_backup/ || true
          
          # 获取Gitee和GitHub之间的差异提交
          echo "获取需要同步的差异提交列表"
          git fetch --all
          
          # 使用正确的方式获取差异提交，避免提交ID格式错误
          DIFF_COMMITS=$(git rev-list --reverse master..gitee/master)
          
          if [[ -n "$DIFF_COMMITS" ]]; then
            echo "开始逐个应用Gitee的提交（保留原始作者信息）"
            # 逐个cherry-pick Gitee的提交，保留原始作者信息
            for COMMIT in $DIFF_COMMITS; do
              echo "应用提交: $COMMIT"
              # 检查提交ID是否有效
              if git cat-file -e $COMMIT 2>/dev/null; then
                # 先清理可能存在的临时目录
                rm -rf workflow_backup
                
                # 执行cherry-pick，处理各种可能情况
                git cherry-pick $COMMIT -X theirs --allow-empty
                CHERRY_PICK_STATUS=$?
                
                if [[ $CHERRY_PICK_STATUS -ne 0 ]]; then
                  echo "检测到问题，尝试解决..."
                  
                  # 处理空提交情况
                  if git status | grep -q "cherry-pick is now empty"; then
                    echo "当前cherry-pick为空提交，跳过..."
                    git cherry-pick --skip
                  # 检查是否是空提交（另一种方式）
                  elif git diff --cached --quiet && git diff --quiet; then
                    echo "当前cherry-pick为空提交，跳过..."
                    git cherry-pick --skip
                  else
                    # 尝试解决冲突
                    echo "尝试自动解决冲突..."
                    git add .
                    git cherry-pick --continue || git cherry-pick --skip
                  fi
                fi
              else
                echo "跳过无效的提交ID: $COMMIT"
              fi
              
              # 再次清理临时目录，确保不会残留
              rm -rf workflow_backup
            done
          else
            echo "没有检测到差异提交，不需要同步"
          fi
          
          # 重新创建临时目录并恢复GitHub上的工作流文件
          mkdir -p workflow_backup
          cp -r workflow_backup/* .github/workflows/ || true
          rm -rf workflow_backup
          
          # 添加工作流文件的变更
          git add .github/workflows/
          git commit -m "Preserve GitHub workflow files" || true
          
          # 最终清理，确保没有临时目录残留
          rm -rf workflow_backup
          
          echo "===== 同步Gitee代码完成（保留完整提交历史）====="

      - name: 推送更改到GitHub
        run: |
          echo "检查是否有更改需要推送"
          # 检查是否有未提交的更改
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "检测到未提交的更改，准备推送到GitHub"
            
            echo "推送到GitHub仓库（不使用force模式）"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/WEIQ311/i-love-operations.git master
          else
            echo "没有检测到更改，跳过推送"
          fi
          
          echo "操作完成，显示最终状态"
          git status
