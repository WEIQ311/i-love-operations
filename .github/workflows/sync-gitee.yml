name: 从Gitee同步到GitHub

# 配置工作流权限
env:
  # 定义需要同步的目录，排除.github/workflows目录
  EXCLUDE_DIRS: .github/workflows

# 只同步除工作流文件外的内容，避免权限问题
permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 * * * *'  # 每天每小时UTC时间整点执行，可根据需要调整cron表达式
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'WEIQ311'
          git config user.email 'weiqiang_6@126.com'

      - name: 配置Git远程仓库
        run: |
          # 移除之前可能存在的gitee远程仓库
          git remote remove gitee || true
          # 重新添加gitee远程仓库
          git remote add gitee https://gitee.com/wei311525/i-love-operations.git
          # 配置fetch所有分支
          git config remote.gitee.fetch '+refs/heads/*:refs/remotes/gitee/*'
          # 显示当前的远程仓库配置
          git remote -v

      - name: 同步Gitee代码（保留原始提交历史）
        run: |
          echo "===== 开始同步Gitee代码 ====="
          echo "当前工作目录: $(pwd)"
          
          echo "获取Gitee仓库的最新代码信息"
          git fetch gitee --prune
          echo "Gitee master分支的最新提交信息:"
          git log -n 1 gitee/master --oneline
          
          # 创建临时分支用于处理同步
          echo "创建临时分支用于同步操作"
          git checkout -b temp-sync-branch
          
          # 尝试使用merge保留Gitee提交历史
          echo "尝试合并Gitee master分支的代码（保留原始提交历史）"
          git merge gitee/master --allow-unrelated-histories -m "Merge Gitee master into temp branch"
          
          # 移除工作流文件以避免权限问题
          echo "移除工作流文件以避免权限问题"
          rm -rf ${{ env.EXCLUDE_DIRS }}
          
          # 添加变更并提交
          echo "添加变更并提交"
          git add .
          git commit -m "Remove workflow files before syncing to GitHub" || true
          
          # 切换回master分支并合并临时分支
          echo "切换回master分支"
          git checkout master
          
          echo "合并临时分支到master"
          git merge temp-sync-branch -m "Sync code from Gitee with original commit history"
          
          # 清理临时分支
          echo "清理临时分支"
          git branch -D temp-sync-branch
          
          echo "===== 同步Gitee代码完成（保留原始提交历史）====="

      - name: 推送更改到GitHub
        run: |
          echo "检查是否有更改需要提交"
          if git log --oneline HEAD^..HEAD | grep -q "Sync code from Gitee"; then
            echo "有新的同步提交，准备推送到GitHub"
            
            echo "推送到GitHub仓库（不使用force模式）"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/WEIQ311/i-love-operations.git master
          else
            echo "没有检测到新的同步提交，跳过推送"
          fi
          
          echo "操作完成，显示最终状态"
          git status
