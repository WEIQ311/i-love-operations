name: 从Gitee同步到GitHub

# 配置工作流权限
env:
  # 定义需要同步的目录，排除.github/workflows目录
  EXCLUDE_DIRS: .github/workflows

# 只同步除工作流文件外的内容，避免权限问题
permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 * * * *'  # 每天每小时UTC时间整点执行，可根据需要调整cron表达式
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'WEIQ311'
          git config user.email 'weiqiang_6@126.com'

      - name: 配置Git远程仓库
        run: |
          # 移除之前可能存在的gitee远程仓库
          git remote remove gitee || true
          # 重新添加gitee远程仓库
          git remote add gitee https://gitee.com/wei311525/i-love-operations.git
          # 配置fetch所有分支
          git config remote.gitee.fetch '+refs/heads/*:refs/remotes/gitee/*'
          # 显示当前的远程仓库配置
          git remote -v

      - name: 同步Gitee代码（保留原始提交历史）
        run: |
          echo "===== 开始同步Gitee代码 ====="
          echo "当前工作目录: $(pwd)"
          
          echo "获取Gitee仓库的最新代码信息"
          git fetch gitee --prune
          echo "Gitee master分支的最新提交信息:"
          git log -n 1 gitee/master --oneline
          
          # 保存当前的工作流文件，避免冲突
          echo "保存当前的工作流文件"
          mkdir -p workflow_backup
          cp -r .github/workflows/* workflow_backup/
          
          # 直接检出Gitee的代码（强制覆盖，但保留工作流文件）
          echo "检出Gitee的代码（强制覆盖）"
          git checkout gitee/master -- .
          
          # 恢复保存的工作流文件
          echo "恢复保存的工作流文件"
          cp -r workflow_backup/* .github/workflows/
          rm -rf workflow_backup
          
          echo "===== 同步Gitee代码完成（保留原始提交历史）====="

      - name: 提交并推送更改
        run: |
          echo "检查是否有更改需要提交"
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "有更改，准备提交"
            git add .
            git commit -m "Sync from Gitee (preserving original commit history)" || true
            
            echo "推送到GitHub仓库（不使用force模式）"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/WEIQ311/i-love-operations.git master
          else
            echo "没有检测到更改，跳过提交和推送"
          fi
          
          echo "操作完成，显示最终状态"
          git status
