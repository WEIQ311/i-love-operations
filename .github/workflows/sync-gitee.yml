name: 从Gitee同步到GitHub

on:
  schedule:
    - cron: '0 * * * *'  # 每天每小时UTC时间整点执行，可根据需要调整cron表达式
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'WEIQ311'
          git config user.email 'weiqiang_6@126.com'

      - name: Add Gitee remote
        run: git remote add gitee https://gitee.com/wei311525/i-love-operations.git

      - name: Pull from Gitee
        run: |
          echo "显示当前仓库状态"
          git status
          
          echo "获取Gitee仓库的最新代码信息"
          git fetch gitee
          git log -n 5 gitee/master --oneline
          
          echo "强制覆盖本地分支以确保获取最新代码"
          git reset --hard gitee/master
          
          echo "确认本地分支已更新"
          git log -n 5 --oneline

      - name: Push to GitHub
        run: |
          echo "推送到GitHub仓库"
          git push --force https://${{ secrets.GITHUB_TOKEN }}@github.com/WEIQ311/i-love-operations.git master
          
          echo "推送完成，显示推送结果"
          git status
