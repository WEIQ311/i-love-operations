name: 从Gitee同步到GitHub

# 配置工作流权限
env:
  # 定义需要同步的目录，排除.github/workflows目录
  EXCLUDE_DIRS: .github/workflows

# 只同步除工作流文件外的内容，避免权限问题
permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 * * * *'  # 每天每小时UTC时间整点执行，可根据需要调整cron表达式
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'WEIQ311'
          git config user.email 'weiqiang_6@126.com'

      - name: 配置Git远程仓库
        run: |
          # 移除之前可能存在的gitee远程仓库
          git remote remove gitee || true
          # 重新添加gitee远程仓库
          git remote add gitee https://gitee.com/wei311525/i-love-operations.git
          # 配置fetch所有分支
          git config remote.gitee.fetch '+refs/heads/*:refs/remotes/gitee/*'
          # 显示当前的远程仓库配置
          git remote -v

      - name: 同步Gitee代码（保留完整提交历史）
        run: |
          echo "===== 开始同步Gitee代码 ====="
          echo "当前工作目录: $(pwd)"
          
          # 确保没有残留的workflow_backup目录
          echo "清理可能残留的临时目录"
          rm -rf workflow_backup || true
          
          echo "获取Gitee仓库的最新代码信息"
          git fetch gitee --prune
          echo "Gitee master分支的最新提交信息:"
          git log -n 1 gitee/master --oneline
          
          # 保存GitHub上的工作流文件
          echo "保存当前工作流文件"
          mkdir -p workflow_backup
          cp -r .github/workflows/* workflow_backup/ || true
          
          # 获取Gitee和GitHub之间的差异提交
          echo "获取需要同步的差异提交列表"
          git fetch --all
          
          # 显示当前分支状态和远程分支信息，用于调试
          echo "显示当前分支状态："
          git branch -av
          
          # 修复：调整git rev-list命令的参数顺序，确保正确获取差异
          echo "比较master和gitee/master分支差异..."
          # 方法1：尝试直接比较两个分支
          DIFF_COMMITS=$(git rev-list --reverse master..gitee/master)
          echo "方法1获取的差异提交数量：$(echo "$DIFF_COMMITS" | wc -l)"
          
          # 如果方法1没有获取到差异，尝试使用方法2
          if [[ -z "$DIFF_COMMITS" ]]; then
            echo "尝试使用替代方法获取差异..."
            # 方法2：使用git cherry命令获取尚未应用的提交
            DIFF_COMMITS=$(git cherry master gitee/master | grep '^+' | awk '{print $2}' | tac)
            echo "方法2获取的差异提交数量：$(echo "$DIFF_COMMITS" | wc -l)"
          fi
          
          if [[ -n "$DIFF_COMMITS" ]]; then
            echo "开始逐个应用Gitee的提交（保留原始作者信息）"
            # 逐个cherry-pick Gitee的提交，保留原始作者信息
            for COMMIT in $DIFF_COMMITS; do
              echo "应用提交: $COMMIT"
              # 检查提交ID是否有效
              if git cat-file -e $COMMIT 2>/dev/null; then
                # 先清理可能存在的临时目录
                rm -rf workflow_backup || true
                
                # 执行cherry-pick，使用更可靠的错误处理机制
                echo "尝试cherry-pick提交: $COMMIT"
                
                # 临时禁用错误退出，确保单个提交失败不会中断整个工作流
                set +e
                
                # 执行cherry-pick并捕获输出和状态
                CHERRY_PICK_OUTPUT=$(git cherry-pick $COMMIT -X theirs --allow-empty 2>&1)
                CHERRY_PICK_STATUS=$?
                
                if [[ $CHERRY_PICK_STATUS -ne 0 ]]; then
                  echo "Cherry-pick失败，状态码: $CHERRY_PICK_STATUS"
                  echo "输出信息: $CHERRY_PICK_OUTPUT"
                  
                  # 检查是否为空提交
                  if echo "$CHERRY_PICK_OUTPUT" | grep -q "cherry-pick is now empty" || git status | grep -q "cherry-pick is now empty"; then
                    echo "检测到空提交，正在跳过..."
                    git cherry-pick --skip || true
                  # 检查是否有冲突
                  elif echo "$CHERRY_PICK_OUTPUT" | grep -q "CONFLICT" || git status | grep -q "Unmerged paths"; then
                    echo "检测到冲突，尝试解决..."
                    git add .
                    git cherry-pick --continue || git cherry-pick --skip || true
                  # 检查工作树是否干净（另一种空提交情况）
                  elif git diff --cached --quiet && git diff --quiet; then
                    echo "工作树干净，视为空提交，跳过..."
                    git cherry-pick --skip || true
                  else
                    echo "其他错误情况，尝试跳过..."
                    git cherry-pick --skip || true
                    # 如果跳过失败，尝试中止cherry-pick
                    git cherry-pick --abort || true
                  fi
                fi
                
                # 恢复错误退出设置
                set -e
              else
                echo "跳过无效的提交ID: $COMMIT"
              fi
              
              # 再次清理临时目录，确保不会残留
              rm -rf workflow_backup || true
            done
          else
            echo "没有检测到差异提交，不需要同步"
            # 添加调试信息，帮助诊断问题
            echo "详细分支信息："
            git log --oneline --decorate --graph --all -n 10
          fi
          
          # 由于在循环中已经清理了workflow_backup目录，我们需要特殊处理工作流文件恢复
          echo "特殊处理工作流文件，确保GitHub上的工作流文件不受影响"
          
          # 检查是否有本地修改的工作流文件
          if git status .github/workflows/ --porcelain | grep -q "^ M"; then
            echo "检测到工作流文件有修改，需要特殊处理"
            # 尝试使用git checkout恢复工作流文件（如果有修改）
            git checkout -- .github/workflows/ || true
          fi
          
          # 添加工作流文件的变更
          git add .github/workflows/
          git commit -m "Preserve GitHub workflow files" || true
          
          # 最终清理，确保没有临时目录残留
          rm -rf workflow_backup || true
          
          echo "===== 同步Gitee代码完成（保留完整提交历史）====="

      - name: 推送更改到GitHub
        run: |
          echo "检查是否有更改需要推送"
          # 检查是否有未提交的更改
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "检测到未提交的更改，准备推送到GitHub"
            
            echo "推送到GitHub仓库（不使用force模式）"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/WEIQ311/i-love-operations.git master
          else
            echo "没有检测到更改，跳过推送"
          fi
          
          echo "操作完成，显示最终状态"
          git status
